<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Tasks"/>
  <title>My Tasks</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs:clamp(.75rem,.7rem + .2vw,.85rem); --text-sm:clamp(.875rem,.82rem + .25vw,.975rem); --text-base:clamp(1rem,.95rem + .2vw,1.1rem); --text-lg:clamp(1.1rem,1rem + .5vw,1.3rem); --text-xl:clamp(1.4rem,1.2rem + .9vw,1.9rem);
      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem; --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem;
      --radius-sm:.5rem; --radius-md:.875rem; --radius-lg:1.25rem; --radius-full:9999px;
      --bg:#f7f6f2; --surface:#ffffff; --surface2:#f2efea; --surface3:#ece8e2; --border:rgba(40,37,29,.1); --divider:rgba(40,37,29,.07);
      --text:#28251d; --muted:#6d6960; --faint:#b3afa8;
      --primary:#01696f; --primaryHover:#0b5258; --primaryTint:#d9ece7;
      --high:#c0392b; --highTint:#fdecea; --highBorder:rgba(192,57,43,.18);
      --med:#c07000; --medTint:#fef4e4; --medBorder:rgba(192,112,0,.18);
      --low:#27774a; --lowTint:#e8f5ed; --lowBorder:rgba(39,119,74,.18);
      --notStarted:#6d6960; --notStartedTint:#f2efea;
      --inProgress:#1a6fb5; --inProgressTint:#e8f1fb;
      --blocked:#b02a8a; --blockedTint:#fdeef8;
      --completed:#27774a; --completedTint:#e8f5ed;
      --shadow:0 8px 24px rgba(40,37,29,.08); --shadowHover:0 12px 32px rgba(40,37,29,.12);
      --font:'Satoshi',system-ui,sans-serif; --transition:180ms cubic-bezier(.16,1,.3,1);
    }
    [data-theme="dark"] {
      --bg:#171614; --surface:#1d1c19; --surface2:#232220; --surface3:#2a2825; --border:rgba(255,255,255,.09); --divider:rgba(255,255,255,.06);
      --text:#efebe2; --muted:#a09a90; --faint:#5a5750;
      --primary:#57a0ab; --primaryHover:#74b7c0; --primaryTint:#263639;
      --high:#e8776d; --highTint:#2e1c1a; --highBorder:rgba(232,119,109,.2);
      --med:#e0a53a; --medTint:#2a2010; --medBorder:rgba(224,165,58,.2);
      --low:#67bf8a; --lowTint:#152316; --lowBorder:rgba(103,191,138,.2);
      --notStarted:#a09a90; --notStartedTint:#232220;
      --inProgress:#72abdd; --inProgressTint:#162234;
      --blocked:#dc78b4; --blockedTint:#2a1224;
      --completed:#67bf8a; --completedTint:#152316;
      --shadow:0 8px 24px rgba(0,0,0,.28); --shadowHover:0 14px 36px rgba(0,0,0,.38);
    }
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:var(--font); }
    body { font-size:var(--text-base); line-height:1.5; }
    button, input, select { font:inherit; color:inherit; }
    .app { min-height:100dvh; display:flex; flex-direction:column; }

    /* TOPBAR */
    .topbar {
      position:sticky; top:0; z-index:20;
      padding:max(env(safe-area-inset-top),.75rem) var(--space-4) var(--space-3);
      background:color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .topbar-inner { width:min(680px,100%); margin:0 auto; }
    .topbar-row { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); }
    .brand { display:flex; align-items:center; gap:.85rem; }
    .logo { width:38px; height:38px; border-radius:13px; background:var(--primaryTint); color:var(--primary); display:grid; place-items:center; }
    h1 { margin:0; font-size:var(--text-lg); line-height:1.1; }
    .subtitle { margin:.1rem 0 0; font-size:var(--text-xs); color:var(--muted); }
    .topbar-actions { display:flex; gap:var(--space-2); align-items:center; }
    .icon-btn {
      min-width:40px; min-height:40px; border-radius:var(--radius-full);
      border:1px solid var(--border); background:var(--surface);
      display:grid; place-items:center; box-shadow:var(--shadow);
    }

    /* FILTERS BAR */
    .filters-bar { padding:var(--space-3) var(--space-4) var(--space-2); border-bottom:1px solid var(--divider); }
    .filters-inner { width:min(680px,100%); margin:0 auto; display:flex; gap:var(--space-2); flex-wrap:wrap; align-items:center; }
    .chip-filter {
      min-height:34px; padding:.4rem .85rem; border-radius:var(--radius-full);
      border:1px solid var(--border); background:var(--surface2); font-size:var(--text-xs); font-weight:700;
    }
    .chip-filter.active { background:var(--primaryTint); color:var(--primary); border-color:color-mix(in srgb, var(--primary) 20%, transparent); }
    .sort-select {
      min-height:34px; padding:.4rem .85rem; border-radius:var(--radius-full);
      border:1px solid var(--border); background:var(--surface2); font-size:var(--text-xs); font-weight:700;
      outline:none; -webkit-appearance:none; appearance:none;
    }

    /* MAIN */
    main { flex:1; width:min(680px,100%); margin:0 auto; padding:var(--space-4) var(--space-4) calc(var(--space-8) + env(safe-area-inset-bottom)); }

    /* STATS ROW */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-3); margin-bottom:var(--space-4); }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-3); text-align:center; }
    .stat-num { font-size:var(--text-xl); font-weight:700; color:var(--primary); line-height:1; }
    .stat-label { font-size:var(--text-xs); color:var(--muted); margin-top:.2rem; }

    /* TASK CARDS */
    .tasks { display:grid; gap:var(--space-3); }
    .task-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:var(--space-4); box-shadow:var(--shadow);
      transition:box-shadow var(--transition), transform var(--transition);
    }
    .task-card:active { transform:scale(.99); box-shadow:var(--shadowHover); }
    .task-header { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--space-2); margin-bottom:var(--space-2); }
    .task-name { font-size:var(--text-base); font-weight:700; line-height:1.3; flex:1; }
    .badge {
      display:inline-flex; align-items:center; padding:.3rem .65rem;
      border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:700;
      white-space:nowrap; flex-shrink:0;
    }
    .badge-high { background:var(--highTint); color:var(--high); border:1px solid var(--highBorder); }
    .badge-med { background:var(--medTint); color:var(--med); border:1px solid var(--medBorder); }
    .badge-low { background:var(--lowTint); color:var(--low); border:1px solid var(--lowBorder); }
    .task-meta { display:flex; flex-wrap:wrap; gap:var(--space-2); align-items:center; }
    .status-pill {
      display:inline-flex; align-items:center; gap:.3rem; padding:.25rem .6rem;
      border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:700;
    }
    .status-dot { width:6px; height:6px; border-radius:var(--radius-full); background:currentColor; opacity:.7; }
    .pill-not-started { background:var(--notStartedTint); color:var(--notStarted); }
    .pill-in-progress { background:var(--inProgressTint); color:var(--inProgress); }
    .pill-blocked { background:var(--blockedTint); color:var(--blocked); }
    .pill-completed { background:var(--completedTint); color:var(--completed); }
    .due-label { font-size:var(--text-xs); color:var(--muted); display:flex; align-items:center; gap:.3rem; }
    .due-label.overdue { color:var(--high); font-weight:700; }
    .due-label.today { color:var(--med); font-weight:700; }
    .due-label.soon { color:var(--primary); font-weight:700; }
    .task-footer { margin-top:var(--space-2); padding-top:var(--space-2); border-top:1px solid var(--divider); font-size:var(--text-xs); color:var(--muted); display:flex; gap:var(--space-4); flex-wrap:wrap; }

    /* EMPTY / LOADING */
    .empty-state { text-align:center; padding:var(--space-8) var(--space-4); color:var(--muted); }
    .empty-icon { font-size:2.5rem; margin-bottom:var(--space-3); }
    .empty-state h3 { margin:0 0 var(--space-2); color:var(--text); font-size:var(--text-lg); }
    .empty-state p { margin:0; max-width:36ch; margin-inline:auto; }

    .loading-card { height:96px; background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border); overflow:hidden; position:relative; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .loading-card::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent 25%,color-mix(in srgb, var(--text) 5%, transparent) 50%,transparent 75%); background-size:200% 100%; animation:shimmer 1.4s ease-in-out infinite; }

    .refresh-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-3); }
    .task-count { font-size:var(--text-sm); color:var(--muted); font-weight:700; }
    .refresh-btn { min-height:34px; padding:.4rem .9rem; border-radius:var(--radius-full); border:1px solid var(--border); background:var(--surface); font-size:var(--text-xs); font-weight:700; display:flex; align-items:center; gap:.4rem; box-shadow:var(--shadow); }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-row">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </div>
          <div>
            <h1>My Tasks</h1>
            <p class="subtitle" id="lastUpdated">Loading…</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" data-theme-toggle aria-label="Switch theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav class="filters-bar" aria-label="Filter tasks">
    <div class="filters-inner">
      <button class="chip-filter active" data-filter="all">All</button>
      <button class="chip-filter" data-filter="Not Started">Not Started</button>
      <button class="chip-filter" data-filter="In Progress">In Progress</button>
      <button class="chip-filter" data-filter="Blocked">Blocked</button>
      <button class="chip-filter" data-filter="Completed">Completed</button>
      <select class="sort-select" id="sortSelect" aria-label="Sort tasks">
        <option value="due">Sort: Due date</option>
        <option value="priority">Sort: Priority</option>
        <option value="added">Sort: Date added</option>
        <option value="status">Sort: Status</option>
      </select>
    </div>
  </nav>

  <main>
    <div class="stats" id="statsRow">
      <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" id="statOpen">—</div><div class="stat-label">Open</div></div>
      <div class="stat-card"><div class="stat-num" id="statOverdue">—</div><div class="stat-label">Overdue</div></div>
    </div>

    <div class="refresh-row">
      <div class="task-count" id="taskCount"></div>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>

    <div class="tasks" id="taskList">
      <div class="loading-card"></div>
      <div class="loading-card"></div>
      <div class="loading-card"></div>
    </div>
  </main>
</div>

<script>
  const SHEET_ID = '1cCSiYyhB1v90KL2X5laaUiLvtX9hkBdJUPMKNgN3ZU0';
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

  const html = document.documentElement;
  const themeToggle = document.querySelector('[data-theme-toggle]');
  let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  const sunIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  const moonIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  themeToggle.innerHTML = theme === 'dark' ? sunIcon : moonIcon;
  themeToggle.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', theme); themeToggle.innerHTML = theme === 'dark' ? sunIcon : moonIcon; });

  let allTasks = [];
  let currentFilter = 'all';
  let currentSort = 'due';

  const priorityOrder = { 'High': 0, 'Med': 1, 'Medium': 1, 'Low': 2 };
  const statusOrder = { 'In Progress': 0, 'Blocked': 1, 'Not Started': 2, 'Not started': 2, 'Completed': 3 };

  function parseDate(str) {
    if (!str || !str.trim()) return null;
    const d = new Date(str.trim());
    return isNaN(d.getTime()) ? null : d;
  }

  function formatDate(str) {
    const d = parseDate(str);
    if (!d) return '';
    return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function dueClass(str) {
    const d = parseDate(str);
    if (!d) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    d.setHours(0,0,0,0);
    const diff = Math.ceil((d - today) / 86400000);
    if (diff < 0) return 'overdue';
    if (diff === 0) return 'today';
    if (diff <= 3) return 'soon';
    return '';
  }

  function dueLabel(str, cls) {
    const formatted = formatDate(str);
    if (!formatted) return '';
    const labels = { overdue: '⚠ Overdue', today: '● Due today', soon: '◆ Due soon: ' };
    const prefix = labels[cls] || 'Due: ';
    return cls && cls !== '' ? `${prefix}${cls !== 'overdue' && cls !== 'today' ? formatted : ''}` : `Due: ${formatted}`;
  }

  function priorityBadge(p) {
    if (!p) return '';
    const lp = p.toLowerCase();
    if (lp === 'high') return `<span class="badge badge-high">High</span>`;
    if (lp === 'med' || lp === 'medium') return `<span class="badge badge-med">Med</span>`;
    if (lp === 'low') return `<span class="badge badge-low">Low</span>`;
    return `<span class="badge">${p}</span>`;
  }

  function statusPill(s) {
    if (!s) return '';
    const ls = s.toLowerCase().replace(/[^a-z]/g,'');
    const map = { 'notstarted':'not-started','inprogress':'in-progress','blocked':'blocked','completed':'completed' };
    const cls = map[ls] || 'not-started';
    return `<span class="status-pill pill-${cls}"><span class="status-dot"></span>${s}</span>`;
  }

  function parseCSV(text) {
    const rows = [];
    const lines = text.trim().split('\n');
    lines.forEach(line => {
      const row = [];
      let inQ = false, cur = '';
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      row.push(cur.trim());
      rows.push(row);
    });
    return rows;
  }

  async function fetchTasks() {
    document.getElementById('taskList').innerHTML = `<div class="loading-card"></div><div class="loading-card"></div><div class="loading-card"></div>`;
    document.getElementById('lastUpdated').textContent = 'Loading…';
    try {
      const res = await fetch(CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text);
      const headers = rows[0].map(h => h.trim());
      const idx = {
        timestamp: headers.findIndex(h => /timestamp/i.test(h)),
        task: headers.findIndex(h => /task/i.test(h)),
        priority: headers.findIndex(h => /priority/i.test(h)),
        status: headers.findIndex(h => /status/i.test(h)),
        dateAdded: headers.findIndex(h => /date.?add/i.test(h)),
        dateDue: headers.findIndex(h => /due/i.test(h)),
        dateCompleted: headers.findIndex(h => /complet/i.test(h)),
        estimatedTime: headers.findIndex(h => /estim/i.test(h)),
        actualTime: headers.findIndex(h => /actual/i.test(h)),
      };
      allTasks = rows.slice(1)
        .filter(r => r[idx.task] && r[idx.task].trim())
        .map((r, i) => ({
          id: i,
          task: r[idx.task] || '',
          priority: r[idx.priority] || '',
          status: r[idx.status] || '',
          dateAdded: r[idx.dateAdded] || '',
          dateDue: r[idx.dateDue] || '',
          dateCompleted: r[idx.dateCompleted] || '',
          estimatedTime: r[idx.estimatedTime] || '',
          actualTime: r[idx.actualTime] || '',
        }));
      const now = new Date();
      document.getElementById('lastUpdated').textContent = `Updated ${now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'})}`;
      renderStats();
      renderTasks();
    } catch (err) {
      document.getElementById('taskList').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load tasks</h3><p>Make sure the sheet is set to "Anyone with link can view" and try again.</p></div>`;
      document.getElementById('lastUpdated').textContent = 'Failed to load';
    }
  }

  function renderStats() {
    const today = new Date(); today.setHours(0,0,0,0);
    const open = allTasks.filter(t => !/complet/i.test(t.status));
    const overdue = allTasks.filter(t => {
      if (/complet/i.test(t.status)) return false;
      const d = parseDate(t.dateDue);
      if (!d) return false;
      d.setHours(0,0,0,0);
      return d < today;
    });
    document.getElementById('statTotal').textContent = allTasks.length;
    document.getElementById('statOpen').textContent = open.length;
    document.getElementById('statOverdue').textContent = overdue.length;
  }

  function sortTasks(tasks) {
    const today = new Date(); today.setHours(0,0,0,0);
    return [...tasks].sort((a, b) => {
      if (currentSort === 'due') {
        const da = parseDate(a.dateDue), db = parseDate(b.dateDue);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return da - db;
      }
      if (currentSort === 'priority') {
        const pa = priorityOrder[a.priority] ?? 99, pb = priorityOrder[b.priority] ?? 99;
        return pa - pb;
      }
      if (currentSort === 'status') {
        const sa = statusOrder[a.status] ?? 99, sb = statusOrder[b.status] ?? 99;
        return sa - sb;
      }
      if (currentSort === 'added') {
        const da = parseDate(a.dateAdded), db = parseDate(b.dateAdded);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return da - db;
      }
      return 0;
    });
  }

  function renderTasks() {
    let tasks = allTasks;
    if (currentFilter !== 'all') tasks = tasks.filter(t => t.status === currentFilter);
    tasks = sortTasks(tasks);
    document.getElementById('taskCount').textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;
    if (tasks.length === 0) {
      document.getElementById('taskList').innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><h3>${currentFilter === 'all' ? 'No tasks yet' : 'No tasks here'}</h3><p>${currentFilter === 'all' ? 'Add tasks using the Google Form.' : 'Try a different filter.'}</p></div>`;
      return;
    }
    document.getElementById('taskList').innerHTML = tasks.map(t => {
      const dc = dueClass(t.dateDue);
      const dl = dueLabel(t.dateDue, dc);
      const footer = [t.estimatedTime ? `⏱ ${t.estimatedTime}` : '', t.actualTime ? `✓ ${t.actualTime}` : '', t.dateCompleted ? `Completed ${formatDate(t.dateCompleted)}` : ''].filter(Boolean).join('<span style="color:var(--faint)"> · </span>');
      return `
        <article class="task-card">
          <div class="task-header">
            <div class="task-name">${t.task}</div>
            ${priorityBadge(t.priority)}
          </div>
          <div class="task-meta">
            ${statusPill(t.status)}
            ${dl ? `<span class="due-label ${dc}">${dl}</span>` : ''}
          </div>
          ${footer ? `<div class="task-footer">${footer}</div>` : ''}
        </article>`;
    }).join('');
  }

  document.querySelectorAll('.chip-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chip-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTasks();
    });
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    currentSort = e.target.value;
    renderTasks();
  });

  document.getElementById('refreshBtn').addEventListener('click', fetchTasks);

  fetchTasks();
</script>
</body>
</html>
